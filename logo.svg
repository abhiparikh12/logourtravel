<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Log Our Travel">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12545f"/>
      <stop offset="1" stop-color="#0b2f36"/>
    </linearGradient>
  </defs>
  <!-- rounded tile -->
  <rect x="4" y="4" width="192" height="192" rx="44" fill="url(#tile)"/>
  <!-- brass sun, upper right -->
  <circle cx="146" cy="52" r="15" fill="#d9a441"/>
  <!-- open logbook: two pages -->
  <g>
    <!-- spine shadow -->
    <rect x="97" y="70" width="6" height="86" rx="3" fill="#08262c"/>
    <!-- left page -->
    <path d="M100 74 C 82 64, 58 64, 40 70 L40 150 C 58 144, 82 144, 100 154 Z" fill="#f4efe4"/>
    <!-- right page -->
    <path d="M100 74 C 118 64, 142 64, 160 70 L160 150 C 142 144, 118 144, 100 154 Z" fill="#eae1d0"/>
    <!-- ruled lines, left -->
    <path d="M52 88 H88 M52 100 H88 M52 112 H82" stroke="#c9bda3" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- route line with pin, over the right page -->
  <path d="M112 138 C 124 138, 126 108, 140 108 S 152 92, 150 88"
        stroke="#2f9e9e" stroke-width="4" stroke-linecap="round" fill="none" stroke-dasharray="0.5 9"/>
  <!-- location pin at the route's end (right page top) -->
  <g transform="translate(131,86)">
    <path d="M0 0 C -11 0 -19 8 -19 18 C -19 32 0 48 0 48 C 0 48 19 32 19 18 C 19 8 11 0 0 0 Z" fill="#c65f38"/>
    <circle cx="0" cy="18" r="7" fill="#f4efe4"/>
  </g>
</svg>
